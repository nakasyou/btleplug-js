name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: btleplug_js.darwin-x64.node
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: btleplug_js.darwin-arm64.node
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: btleplug_js.linux-x64-gnu.node
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: btleplug_js.linux-arm64-gnu.node
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: btleplug_js.win32-x64-msvc.node
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux BLE build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libdbus-1-dev
      - run: bun install --frozen-lockfile
      - name: Build native addon
        run: bunx napi build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - run: bun run build:js
      - run: bunx napi artifacts --output-dir artifacts
      - name: Publish platform packages
        run: |
          for dir in npm/*; do
            npm publish "$dir" --access public --provenance --ignore-scripts
          done
      - name: Publish entry package
        run: npm publish --access public --provenance --ignore-scripts
